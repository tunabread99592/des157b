<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Liberty</title>

    <!-- libaries -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <script src="http://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script> 
    <script src="http://threejs.org/examples/js/libs/stats.min.js"></script>

    <!-- normal  -->
    <link href="styles.css" rel="stylesheet">
    <script src="script.js" defer></script>

</head>
<body>

    <!-- particles.js container -->
    <div id="particles-js"></div>
    <!-- <div class="count-particles">
        <span class="js-count-particles">--</span> particles
    </div>  -->


    <div class="move" data-aos="flip-left" data-aos-duration="1500">
        <p>Testing out some Libraries</p>
    </div>

    <div class="move" data-aos="flip-up" data-aos-duration="1500">
        <p>Flippity Flop</p>
    </div>

    <div class="move"  data-aos="zoom-in-up" data-aos-duration="1500">
        <p>Kapow</p>
    </div>

    <div class="move" data-aos="fade-right" data-aos-offset="300" data-aos-easing="ease-in-sine">
        <p>Ssssssshhhwip</p>
    </div>

    <footer>
        <ul>
            <li><a href="https://vincentgarreau.com/particles.js/#nasa">Particles js</a></li>
            <li><a href="https://michalsnik.github.io/aos/">Animate on Scroll</a></li>
        </ul>
    </footer>
    
</body>

</html>
