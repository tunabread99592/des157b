<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="styles.css">

    <script src="script.js" defer></script>

    <title>Allergy Szn</title>
</head>
<body>

    <section>
        <img src="images/nose3.png" alt="rocket" height="750">
    </section>

    <main>
         <header>
            <img src="images/title.svg" alt="allergy-szn" height="120">
        </header>

        <div id="action-area">
            <p>Click to watch me overcome</p>
            <div id="timeline">
                <div id="bar"></div>
                <div id="timestamps">
                    <div class="dot" id="one"></div>
                    <div class="dot" id="two"></div>
                    <div class="dot" id="three"></div>
                    <div class="dot" id="four"></div>
                    <div class="dot" id="five"></div>
                    <div class="dot" id="six"></div>
                    <div class="dot" id="seven"></div>
                    <div class="dot" id="eight"></div>
                </div>
            </div>
            <ul>
                <li>10 AM</li>
                <li>4 PM</li>
                <li>10 PM</li>
                <li>4 AM</li>
                <li>10 AM</li>
            </ul>
        </div>

        
        <div id="container">
            <div id="bees">
                <h3># of Sneezes:</h2>
                <img src="images/bee.png" alt="bee" width="50">
            </div>

            <div id="condition">
                <h3>Condition:</h2>
                <p>peanut butter</p>
            </div>

            <div id="feeling">
                <h3>Feeling:</h2>
                <p>aw man</p>
            </div>

            <div id="reason">
                <h3>Reason:</h2>
                <p>so sad</p>
            </div>
        </div>
    </main>
    
</body>
</html>
